<!DOCTYPE html>
<html lang="en">

<!--Metadata of html/page-->
<head>
    <!--font library -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cantarell:ital,wght@0,400;0,700;1,400;1,700&family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Momo+Trust+Display&family=Short+Stack&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <title>Momentum</title>
    <style>
        * {
            box-sizing: border-box;  /* sizing for everything */
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* Momentum Header */
        h1 {
            margin: 0 0 32px 0;               /* top-left, with spacing below */
            font-size: 28px;
            line-height: 1.2;
        }

        /*------------- background -------------*/
        body {
            margin: 0; /* space outside element- */
            padding: 40px; /* space inside element (gap between edges) */
            color: black;    /* element color */
            background-color: #cfcfcf; /* background color */
            line-height: 1.5; /* height between elements */
            font-family: "Elms Sans", sans-serif; /* default font */
        }

        /*------------- foreground -------------*/
        /* container of content */
        .container {
            height: calc(100vh - 80px); /* viewport height - 2*background padding (account for initial pad) */
            padding: 50px;
            background-color: #f1f1f1;
            border-radius: 30px;
            border: 2px double #ffffff;
        }

        /* all task content */
        .task-content {
            display: flex;              /* arrange children in a row */
            gap: 24px;                  /* space between the two columns */
            max-width: 1100px;          /* width of content */
            margin: 0 auto;             /* center */
            padding: 24px;              /* space between container and content */

            /* for future ref: If I want to surround the task content */
            /*border: 2px double #d5d5d5;*/
            /*border-radius: 15px;*/
            /*background-color: #f6f6f6;*/
        }

        /*------------- Tasks body -------------*/
        .task-column {
            flex: 1;                  /* take all remaining space */
            border: 1px solid #ffffff;
            border-radius: 15px;
            padding: 40px;
            background-color: white;
        }

        /*------------- Task adding form -------------*/
        .form-column {
            width: 280px;
        }

        #add-task-form {
            flex-direction: column;
            display: flex;              /* lay elements row format (default) */
            gap: 8px;                   /* gap between elements */
            margin-bottom: 24px;        /* gap between task form and list */
            background-color: white;
            border: 1px solid #dddfff;
            border-radius: 15px;
            padding: 16px;
        }

        /* Task info boxes */
        #add-task-form input,
        #add-task-form button {
            padding: 8px;   /* size of border/boxes */
            background-color: #f6f6f6;
            border: 1px solid #c1c1c1; /* border attributes */
            border-radius: 15px; /* radius of boxes (makes round) */
            font-size: 14px;     /* size of text font */
            font-family: inherit;  /* match the body font */
        }
        /* Task add button */
        #add-task-form button {
            background-color: #face5c;
            color: #ffffff;
            border: none;
            cursor: pointer; /* make cursor pointer when hovering */
        }
        #add-task-form button:hover {
            background-color: #ffb300;
        }

        /*------------- Upcoming task -------------*/
        #next-task {
            background-color: #f6f6f6;
            border: 2px double #e4e4e4;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        /* upcoming task header (h2) */
        #next-task h2 {
            font-family: "Short Stack", cursive;
            font-weight: 400;
            font-style: normal;
            font-size: 14px;
            text-transform: uppercase;
            color: #666;
            margin: 0 0 8px 0;
        }
        /* content of upcoming task */
        #next-task-content {
            font-size: 18px;
            font-weight: 600;
        }

        /*------------- List of Tasks -------------*/
        #task-list {
            list-style: none;       /* remove bullets */
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;        /* scrollbar if content overflows */
        }
        /* individual tasks */
        #task-list li {
            font-family: "Cantarell", sans-serif;
            font-weight: lighter;
            font-size: clamp(0.6rem, 0.9vw, 0.9rem);
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #f6f6f6;
            border: 2px solid #ededed;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
        }
        #task-list li span {
            flex: 1;                /* take up remaining space, pushing buttons right */
        }

        /* complete/delete buttons */
        #task-list button {
            font-family: "Short Stack", cursive;
            padding: 4px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .complete-btn {
            background-color: #a9ffa9;
        }
        .complete-btn:hover {
            background-color: #9be89a;
        }
        .delete-btn {
            background-color: #f19898;
        }
        .delete-btn:hover {
            background-color: #dd8c8c;
        }

    </style>
</head>

<!--the body of the html/page-->
<body>
<main class="container">
    <h1>Momentum</h1>

<!--content-->
    <div class="task-content">
       <!--tasks body-->
        <div class="task-column">
            <!--upcoming task-->
            <section id="next-task">
                <h2>To Complete</h2>
                <div id="next-task-content">Loading...</div>
            </section>

            <ul id="task-list"></ul>
        </div>

        <!--HTML form for adding task-->
        <aside class="form-column">
            <form id="add-task-form" autocomplete="off">
                <input type="text" id="title-input" placeholder="Task title" required>
                <input type="text" id="category-input" placeholder="Category">
                <input type="datetime-local" id="deadline-input" required>
                <button type="submit">Add</button>
            </form>
        </aside>
    </div>
</main>

<script>
    // ---------- State ----------
    let nextTaskTitle = null;
    let nextTaskDeadline = null;

    // ---------- Helpers ----------
    function formatDeadline(isoString) {
        const cleaned = isoString.replace(/\[.*\]/, '');
        const date = new Date(cleaned);

        const datePart = date.toLocaleDateString('en-US', {
            weekday: 'long',
            month: 'long',
            day: 'numeric'
        });

        const hour = date.getHours().toString().padStart(2, '0');
        const minute = date.getMinutes().toString().padStart(2, '0');
        const timePart = `${hour}:${minute}`;

        return `${datePart} (${timePart})`;
    }

    function updateCountdown() {
        const content = document.getElementById('next-task-content');

        //no tasks
        if (!nextTaskDeadline) {
            content.textContent = 'No upcoming tasks';
            return;
        }

        const diff = nextTaskDeadline - new Date();

        //overdue
        if (diff < 0) {
            content.textContent = `${nextTaskTitle} — overdue`;
            return;
        }

        const minutes = Math.floor(diff / 60000);

        //less than an hour
        if (minutes < 60) {
            if (minutes === 0) {
                content.textContent = `${nextTaskTitle} — due in less than a minute`;
            } else {
                content.textContent = `${nextTaskTitle} — due in ${minutes} minute${minutes === 1 ? '' : 's'}`;
            }
        //1+ days
        } else if (minutes > 60 * 24) {
            const days = Math.floor(minutes / (60 * 24));
            content.textContent = `${nextTaskTitle} — due in ${days} day${days === 1 ? '' : 's'}`;
        } else {
        //one or more hours
            const hours = Math.floor(minutes / 60);
            content.textContent = `${nextTaskTitle} — due in ${hours} hour${hours === 1 ? '' : 's'}`;
        }
    }

    // ---------- Rendering ----------
    async function loadTasks() {

        // testing purposes
        // const data = {
        //     tasks: [
        //         { id: '1', title: 'Finish CPSC lab',     deadline: '2026-04-25T14:00Z[UTC]' },
        //         { id: '2', title: 'Read Chapter 4',      deadline: '2026-04-25T20:30Z[UTC]' },
        //         { id: '3', title: 'Prep slides',         deadline: '2026-04-26T09:00Z[UTC]' },
        //         { id: '4', title: 'Email professor',     deadline: '2026-04-27T15:45Z[UTC]' },
        //         { id: '1', title: 'Finish CPSC lab',     deadline: '2026-04-25T14:00Z[UTC]' },
        //         { id: '2', title: 'Read Chapter 4',      deadline: '2026-04-25T20:30Z[UTC]' },
        //         { id: '3', title: 'Prep slides',         deadline: '2026-04-26T09:00Z[UTC]' },
        //         { id: '4', title: 'Email professor',     deadline: '2026-04-27T15:45Z[UTC]' },
        //         { id: '5', title: 'Submit assignment 3', deadline: '2026-04-28T23:59Z[UTC]' }
        //     ]
        // };

        const response = await fetch('/api/tasks');
        const data = await response.json();
        const list = document.getElementById('task-list');
        list.innerHTML = '';

        for (const task of data.tasks) {
            const li = document.createElement('li');


            const text = document.createElement('span');
            text.textContent = `${task.title} — due ${formatDeadline(task.deadline)}`;
            li.appendChild(text);

            //complete button
            const completeButton = document.createElement('button');
            completeButton.textContent = 'Complete';
            completeButton.classList.add('complete-btn');
            completeButton.addEventListener('click', () => completeTask(task.id));
            li.appendChild(completeButton);

            //delete button
            const deleteButton = document.createElement('button');
            deleteButton.textContent = 'Delete';
            deleteButton.classList.add('delete-btn');
            deleteButton.addEventListener('click', () => deleteTask(task.id));
            li.appendChild(deleteButton);

            list.appendChild(li);
        }
    }

    async function loadNextTask() {
        const response = await fetch('/api/tasks/next');
        const data = await response.json();

        if (!data.title) {
            nextTaskTitle = null;
            nextTaskDeadline = null;
        } else {
            nextTaskTitle = data.title;
            nextTaskDeadline = new Date(data.deadline.replace(/\[.*\]/, ''));
        }

        updateCountdown();
    }

    // ---------- API actions ----------
    async function completeTask(taskId) {
        await fetch(`/api/tasks/${taskId}/complete`, { method: 'PATCH' });
        loadTasks();
        loadNextTask();
    }

    async function deleteTask(taskId) {
        await fetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
        loadTasks();
        loadNextTask();
    }

    // ---------- Form submission ----------
    document.getElementById('add-task-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('title-input').value;
        const category = document.getElementById('category-input').value || null;
        const localDeadline = document.getElementById('deadline-input').value;
        // datetime-local gives "2026-04-25T14:00" — convert to backend ZonedDateTime format
        const deadline = new Date(localDeadline).toISOString().replace('Z', 'Z[UTC]');

        const body = {
            id: crypto.randomUUID(),
            title,
            category,
            deadline
        };

        await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        e.target.reset();
        loadTasks();
        loadNextTask();
    });

    // ---------- Init ----------
    loadTasks();
    loadNextTask();
    setInterval(updateCountdown, 60000);
</script>
</body>
</html>
